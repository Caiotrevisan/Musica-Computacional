<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="css/estilo.css" >
</head>

<body>

    <form action="#" method="GET">
        <table border=2px>

            <thead>
                <tr colspan="2">Formulário para Contato</tr>
            </thead>

            <tr>
                <td><label for="nome">Nome: </label><input id="nome" type="text" required autofocus> </td>
            </tr>

            <tr>
                <td><label for="telefone">Telefone: </label><input id="telefone" type="tel" required> </td>
            </tr>

            <tr>
                <td><label for="endereco">Endereço: </label><input id="endereco" type="adress" autocomplete="on" required> </td>
            </tr>

            <tr>
                <td><label for="email">E-mail</label><input id="email" type="email" required> </td>
            </tr>

            <tr>
                <td><label for="senha">Senha: </label><input id="senha" type="password" required> </td>
            </tr>




            <td colspan="4">
                <fieldset>
                    <legend>Sexo</legend>
                    <input type="radio" name="sexo" id="masc" value="masc">
                    <label for="masc">Masculino</label> <br>

                    <input type="radio" name="sexo" id="fem" value="fem">
                    <label for="fem">Feminino</label> <br>

                    <input type="radio" name="sexo" id="outros" value="outros">
                    <label for="outros">Outros</label> <br>

                </fieldset>
            </td>

            <tr>
                <td><input type="submit"> </td>
            </tr>

            <tr>
                <td><input type="reset"> </td>
            </tr>

            <tfoot>
                <tr>
                    <th colspan="2">Confira todas as informações antes de enviar.</th>
                </tr>
            </tfoot>

        </table>
    </form>

    <footer>
        <br>
        <br>
        <h2>Navegue:</h2>

        <nav>
            <h2> <a href="Home.html"> HOME </a></h2>
            <h2> <a href="MusicaComputacional.html"> Música Computacional</a></h2>
            <h2> <a href="Midi.html"> MIDI</a></h2>
        </nav>


        <h3> <a href="Contato.html"></a>Contato</h3>

    </footer>



</body>

</html>
